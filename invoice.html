<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Invoice

</title>

<link
rel="stylesheet"
href="css/invoice.css">

</head>

<body>

<div class="container">



<!-- HEADER -->

<div class="top">

<h1>

Invoice Generator

</h1>

<a
href="dashboard.html"
class="back">

← Dashboard

</a>

</div>





<!-- FORM -->

<div class="form">



<select
id="customer">

<option value="">

Select Customer

</option>

</select>




<input
id="mobile"

placeholder="Mobile"

readonly>




<input
id="service"

placeholder="Service"

readonly>




<input
id="total"

placeholder="Total"

readonly>




<input
id="paid"

placeholder="Paid"

readonly>




<input
id="pending"

placeholder="Pending"

readonly>




</div>






<!-- INVOICE -->

<div
class="invoice"
id="invoice">

<h2>

Deepika Makeup Studio

</h2>



<div
id="invoiceNo">

Invoice: INV001

</div>





<div class="line">

<label>

Customer

</label>

<span
id="showName">

-

</span>

</div>





<div class="line">

<label>

Mobile

</label>

<span
id="showMobile">

-

</span>

</div>





<div class="line">

<label>

Service

</label>

<span
id="showService">

-

</span>

</div>





<div class="line">

<label>

Total

</label>

<span
id="showTotal">

₹0

</span>

</div>





<div class="line">

<label>

Paid

</label>

<span
id="showPaid">

₹0

</span>

</div>





<div class="line">

<label>

Pending

</label>

<span
id="showPending">

₹0

</span>

</div>



</div>






<!-- BUTTONS -->

<div class="actions">

<button
onclick="generateInvoice()">

Generate

</button>



<button
onclick="printInvoice()">

Print

</button>



<button
onclick="shareWA()">

WhatsApp

</button>


</div>



</div>



<script
src="js/invoice.js">

</script>

</body>

</html>
