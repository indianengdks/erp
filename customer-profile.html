<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Customer Profile

</title>

<link
rel="stylesheet"

href="css/customer-profile.css">

</head>

<body>


<div class="container">


<!-- HEADER -->

<div class="top">


<div>

<h1>

Customer Profiles

</h1>

<p>

Customer History • Payments • Pending

</p>

</div>


<a
href="dashboard.html"
class="back">

← Dashboard

</a>


</div>





<!-- SEARCH -->

<div class="searchBox">

<input

id="search"

placeholder=

"Search customer or mobile"

onkeyup=

"renderProfiles()"

>

</div>






<!-- SUMMARY -->

<div class="stats">


<div class="card">

<h3>

Customers

</h3>

<div
id="totalCustomer">

0

</div>

</div>



<div class="card">

<h3>

Revenue

</h3>

<div
id="totalRevenue">

₹0

</div>

</div>



<div class="card">

<h3>

Pending

</h3>

<div
id="totalPending">

₹0

</div>

</div>


</div>






<!-- LIST -->

<div
id="profileList">

</div>





<!-- PAYMENT POPUP -->

<div
id="payBox"

class="popup">

<div
class="popupCard">


<h2>

Receive Payment

</h2>


<input

id="payAmount"

type="number"

placeholder="Amount"

>


<select
id="payMode">

<option>

Cash

</option>

<option>

UPI

</option>

<option>

Card

</option>

</select>



<div class="btns">


<button
onclick="savePayment()">

Save

</button>


<button
onclick="closePay()">

Close

</button>


</div>


</div>

</div>




</div>



<script
src="js/customer-profile.js">

</script>

</body>

</html>
