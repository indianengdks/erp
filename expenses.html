<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Expenses
</title>

<link
rel="stylesheet"
href="css/expenses.css">

</head>

<body>

<div class="container">


<!-- TOP -->

<div class="top">

<h1>

Expenses

</h1>


<a
href="dashboard.html"
class="back">

Dashboard →

</a>

</div>




<!-- ENTRY SECTION -->

<div class="grid">


<!-- STAFF -->

<div class="box">

<div class="head">

<h2>

Staff Salary

</h2>


<button
type="button"
onclick="addSalary()">

+

</button>

</div>



<div class="form">

<input
id="sDate"
type="date">


<input
id="sMonth"
placeholder="Month">


<input
id="sStaff"
placeholder="Staff Name">


<input
id="sAmount"
type="number"
placeholder="Amount">


<input
id="sMode"
placeholder="Cash / UPI">


<input
id="sNotes"
placeholder="Notes">

</div>



<div
id="salaryList"
class="list">

</div>

</div>






<!-- PURCHASE -->

<div class="box">

<div class="head">

<h2>

Purchase Item

</h2>


<button
type="button"
onclick="addPurchase()">

+

</button>

</div>



<div class="form">

<input
id="pDate"
type="date">


<input
id="pItem"
placeholder="Item">


<input
id="pCost"
type="number"
placeholder="Cost">


<input
id="pSupplier"
placeholder="Supplier">


<input
id="pQty"
placeholder="Qty">


<input
id="pNotes"
placeholder="Notes">

</div>



<div
id="purchaseList"
class="list">

</div>

</div>



</div>





<!-- TOTAL -->

<div class="cards">



<div class="card">

<div>

Salary

</div>

<span
id="salaryValue">

₹0

</span>

</div>





<div class="card">

<div>

Purchase

</div>

<span
id="purchaseValue">

₹0

</span>

</div>





<div class="card">

<div>

Grand Total

</div>

<span
id="grandValue">

₹0

</span>

</div>



</div>





<!-- MONTH REPORT -->

<div class="report">

<div>

<h2>

Monthly Report

</h2>


<p
id="monthReport">

No Data

</p>

</div>



<button

class="exportBtn"

onclick="downloadCSV()">

⬇ Export CSV

</button>


</div>





<!-- HISTORY -->

<div class="history">


<div class="history-top">


<h2>

Expense History

</h2>



<input

id="search"

placeholder=

"Search date / staff / item"


>


</div>




<div

id="historyList">

</div>



</div>





</div>




<script
src="js/expenses.js">

</script>


</body>

</html>
